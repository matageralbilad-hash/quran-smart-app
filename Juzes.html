<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأجزاء | منصة صوتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #064E3B; /* لون الخلفية الأخضر الداكن الموحد */
            --header-dark: #033E2F; /* لون الهيدر الفخم */
            --accent-green: #10B981;
            --white: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.08); /* خلفية زجاجية للبطاقات لتوحيد الهوية */
        }

        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--primary-dark);
            margin: 0;
            color: var(--white);
            min-height: 100vh;
        }

        /* القائمة العلوية (Header) الموحدة والفخمة */
        header {
            background-color: var(--header-dark);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--accent-green);
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .settings-trigger {
            cursor: pointer;
            transition: transform 0.5s ease;
            display: flex;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
        }

        .settings-trigger:hover { transform: rotate(90deg); }

        .brand-name {
            font-weight: bold; 
            color: var(--white); 
            font-size: 1.1rem; 
            text-align: center;
            margin: 0;
            flex-grow: 1;
        }

        /* القائمة الجانبية المنسدلة */
        .overlay-menu {
            height: 0%;
            width: 100%;
            position: fixed;
            z-index: 1000;
            top: 0;
            right: 0;
            background-color: rgba(3, 62, 47, 0.98);
            overflow: hidden;
            transition: 0.5s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .overlay-menu a {
            padding: 10px;
            text-decoration: none;
            font-size: 2.2rem;
            color: var(--white);
            display: block;
            transition: 0.3s;
            font-family: 'Amiri', serif;
        }

        .overlay-menu a:hover { color: var(--accent-green); }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 4rem;
            color: white;
            cursor: pointer;
        }

        /* شبكة الأجزاء المحسنة بصرياً */
        .juz-container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 992px) { .juz-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .juz-container { grid-template-columns: repeat(2, 1fr); padding: 15px; } }

        .juz-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .juz-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-green);
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .juz-card:hover .juz-label { color: var(--accent-green); }

        .juz-number {
            font-family: 'Amiri', serif;
            font-size: 2.4rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .juz-label {
            font-size: 1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية الضخمة -->
    <div id="bigMenu" class="overlay-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <div class="overlay-content" style="text-align: center; width: 100%;">
            <a href="Surah.html">قائمة السور</a>
            <a href="Juzes.html" onclick="closeNav()">الأجزاء الثلاثين</a>
            <a href="Search_by_word.html">البحث بالآيات</a>
            <a href="Share.html">مشاركة التطبيق</a>
            <hr style="width: 10%; border: 0.5px solid var(--accent-green); margin: 20px auto;">
            <a href="home.html" style="font-size: 1.2rem; opacity: 0.7;">الرئيسية</a>
        </div>
    </div>

    <!-- الهيدر المطور بالكامل مع الحفاظ على الترس الأصلي الملتف والزر الرجوع -->
    <header>
        <div class="header-right">
            <!-- زر العودة المباشر للصفحة الرئيسية -->
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
            
            <!-- أيقونة الترس الأصلية المسترجعة بالكامل لفتح القائمة الجانبية -->
            <button class="settings-trigger" onclick="openNav()">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-green);">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
        <h1 class="brand-name">منصة صوتك | أجزاء القرآن</h1>
        <div style="width: 60px;"></div> <!-- توازن لتوسيط العنوان تماماً -->
    </header>

    <!-- حاوية شبكة الأجزاء المحدثة -->
    <div class="juz-container" id="juzGrid"></div>

    <script>
        function openNav() { document.getElementById("bigMenu").style.height = "100%"; }
        function closeNav() { document.getElementById("bigMenu").style.height = "0%"; }

        const gridElement = document.getElementById('juzGrid');
        
        if(gridElement) {
            for (let i = 1; i <= 30; i++) {
                gridElement.innerHTML += `
                    <a href="quran_view.html?juz=${i}" class="juz-card">
                        <span class="juz-label">الجزء</span>
                        <span class="juz-number">${i}</span>
                    </a>
                `;
            }
        }
    </script>
</body>
</html>
