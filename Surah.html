<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف | منصة صوتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #064E3B; /* لون الخلفية الأخضر الداكن */
            --header-dark: #033E2F; /* لون الهيدر الفخم */
            --accent-green: #10B981;
            --white: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.08); /* خلفية زجاجية للبطاقات */
        }

        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--primary-dark); /* توحيد اللون مع الصفحة الرئيسية */
            margin: 0;
            color: var(--white);
            min-height: 100vh;
        }

        /* القائمة العلوية (Header) الموحدة والفخمة */
        header {
            background-color: var(--header-dark);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--accent-green);
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .settings-trigger {
            cursor: pointer;
            transition: transform 0.5s ease;
            display: flex;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
        }

        .settings-trigger:hover { transform: rotate(90deg); }

        .brand-name {
            font-weight: bold; 
            color: var(--white); 
            font-size: 1.1rem; 
            text-align: center;
            margin: 0;
            flex-grow: 1;
        }

        /* شريط البحث الذكي */
        .search-wrapper {
            width: 90%;
            max-width: 500px;
            margin: 25px auto 10px auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: var(--white);
            font-family: 'Almarai', sans-serif;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .search-input::placeholder { color: rgba(255, 255, 255, 0.5); }
        .search-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-green);
            font-size: 1.1rem;
        }

        /* القائمة الجانبية المنسدلة */
        .overlay-menu {
            height: 0%;
            width: 100%;
            position: fixed;
            z-index: 1000;
            top: 0;
            right: 0;
            background-color: rgba(3, 62, 47, 0.98);
            overflow: hidden;
            transition: 0.5s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .overlay-menu a {
            padding: 10px;
            text-decoration: none;
            font-size: 2.2rem;
            color: var(--white);
            display: block;
            transition: 0.3s;
            font-family: 'Amiri', serif;
        }

        .overlay-menu a:hover { color: var(--accent-green); }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 4rem;
            color: white;
            cursor: pointer;
        }

        /* شبكة السور المحسنة */
        .surah-container {
            padding: 20px 30px 40px 30px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 992px) { .surah-container { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .surah-container { grid-template-columns: repeat(2, 1fr); padding: 15px; } }

        .surah-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            color: var(--white);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .surah-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-green);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .s-num {
            font-size: 0.8rem;
            color: var(--accent-green);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .s-name {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية الضخمة -->
    <div id="bigMenu" class="overlay-menu">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="Surah.html">قائمة السور</a>
        <a href="Juzes.html">الأجزاء الثلاثين</a>
        <a href="Search_by_word.html">البحث بالآيات</a>
        <a href="Share.html">مشاركة التطبيق</a>
        <hr style="width: 10%; border: 0.5px solid var(--accent-green); margin: 20px;">
        <a href="home.html" style="font-size: 1.2rem; opacity: 0.7;">الرئيسية</a>
    </div>

    <!-- الهيدر المطور بالكامل مع الترس الأصلي المسترجع -->
    <header>
        <div class="header-right">
            <!-- زر العودة المباشر للصفحة الرئيسية -->
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
            
            <!-- تم إرجاع وسم الـ SVG الأصلي الخاص بالترس الدوار لفتح القائمة الجانبية -->
            <button class="settings-trigger" onclick="openNav()">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-green);">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
        <h1 class="brand-name">منصة صوتك | قائمة السور</h1>
        <div style="width: 60px;"></div> <!-- توازن لتوسيط العنوان تماماً -->
    </header>

    <!-- حقل البحث الذكي -->
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن اسم السورة ..." oninput="filterSurahs()">
        <i class="fas fa-search"></i>
    </div>

    <!-- حاوية شبكة السور المحدثة -->
    <div class="surah-container" id="grid"></div>

    <script>
        function openNav() { document.getElementById("bigMenu").style.height = "100%"; }
        function closeNav() { document.getElementById("bigMenu").style.height = "0%"; }

        const surahList = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];

        const gridElement = document.getElementById('grid');
        
        // دالة بناء السور في الصفحة لأول مرة
        function renderSurahs() {
            if(gridElement) {
                gridElement.innerHTML = "";
                surahList.forEach((name, i) => {
                    gridElement.innerHTML += `
                        <a href="quran_view.html?id=${i+1}" class="surah-card" data-name="${name}">
                            <span class="s-num">${i+1}</span>
                            <span class="s-name">${name}</span>
                        </a>
                    `;
                });
            }
        }

        // دالة خارقة لمعالجة وتوحيد النصوص العربية برمجياً (تتخلص من التاء المربوطة والهمزات وال التعريف)
        function normalizeArabic(text) {
            if (!text) return '';
            return text
                .replace(/[\u064B-\u0652]/g, "") // إزالة التشكيل والحركات
                .replace(/[أإآأ]/g, "ا")       // توحيد الألف والهمزات إلى ألف عادية
                .replace(/ة/g, "ه")            // توحيد التاء المربوطة لتصبح هاء
                .replace(/^ال/, "")            // حذف "ال" التعريف إذا كانت في بداية الكلمة لإتاحة البحث المرن
                .trim();
        }

        // دالة الفلترة الذكية الفورية أثناء الكتابة
        function filterSurahs() {
            // معالجة النص المدخل في حقل البحث وتجريده لغوياً
            const rawQuery = document.getElementById("searchInput").value;
            const normalizedQuery = normalizeArabic(rawQuery);
            
            const cards = document.querySelectorAll(".surah-card");
            
            cards.forEach(card => {
                // معالجة اسم السورة الفعلي المخزن وتجريده لغوياً قبل المقارنة
                const rawName = card.getAttribute("data-name");
                const normalizedName = normalizeArabic(rawName);
                
                // البحث الآن يطابق الجزء المعالج ذكياً
                if (normalizedName.includes(normalizedQuery)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // تشغيل البناء الأولي عند فتح الصفحة تلقائياً
        document.addEventListener("DOMContentLoaded", () => {
            renderSurahs();
        });
    </script>
</body>
</html>
