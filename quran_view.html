<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تلاوة القرآن الكريم | منصة صوتك</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #064E3B;
            --header-dark: #033E2F;
            --accent-green: #10B981;
            --white: #FFFFFF;
            --paper-bg: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Amiri', serif;
            background-color: var(--primary-dark);
            margin: 0;
            color: var(--white);
            min-height: 100vh;
            padding-bottom: 120px; /* زيادة المساحة السفلية لئلا يغطي الشريط على الآيات الأخيرة */
        }

        /* الهيدر الموحد */
        header {
            background-color: var(--header-dark);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            box-sizing: border-box;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--accent-green);
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        .settings-trigger {
            cursor: pointer;
            transition: transform 0.5s ease;
            display: flex;
            align-items: center;
            background: none;
            border: none;
            padding: 0;
        }
        .settings-trigger:hover { transform: rotate(90deg); }

        .brand-name {
            font-family: 'Almarai', sans-serif;
            font-weight: bold; 
            color: var(--white); 
            font-size: 1.1rem; 
            text-align: center;
            margin: 0;
            flex-grow: 1;
        }

        /* حاوية النص القرآني */
        .quran-container {
            max-width: 800px;
            margin: 30px auto;
            width: 90%;
            background: var(--paper-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: justify;
            line-height: 2.3;
            box-sizing: border-box;
        }

        /* فواصل وسياج السور في عرض الأجزاء */
        .surah-divider {
            display: block;
            text-align: center;
            margin: 40px 0 25px 0;
            position: relative;
        }
        .surah-divider::before {
            content: "";
            position: absolute;
            top: 50%; left: 0; width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent-green), transparent);
            z-index: 1;
        }
        .surah-title-badge {
            position: relative;
            z-index: 2;
            background: #033E2F;
            color: var(--white);
            padding: 6px 30px;
            border-radius: 50px;
            font-family: 'Almarai', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid var(--accent-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* البسملة */
        .basmalah {
            display: block;
            text-align: center;
            font-size: 2.4rem;
            margin: 20px 0 30px 0;
            color: var(--white);
            font-weight: bold;
        }

        /* تصميم الآيات */
        .ayah {
            font-size: 2rem;
            word-spacing: 2px;
            transition: font-size 0.2s ease;
        }
        .ayah-num {
            font-family: 'Almarai', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent-green);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.4);
            width: 28px;
            height: 28px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-right: 5px;
            margin-left: 5px;
            vertical-align: middle;
        }

        /* إصلاح وتطوير لوحة التحكم العائمة بالأسفل لتظهر بوضوح وتستجيب فوراً للضغط */
        .control-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #02251C; /* جعل الخلفية أغمق لتبدو الأزرار بارزة */
            border: 1px solid var(--accent-green);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 9999; /* رفع كفاءة الطبقة لتكون فوق كل شيء وقابلة للضغط دائماً */
        }
        
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--white);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: 'Almarai', sans-serif;
            transition: 0.2s;
        }
        .control-btn:hover, .control-btn:active { 
            background: var(--accent-green); 
            color: #000000; 
        }

        .status-loading {
            text-align: center;
            font-family: 'Almarai', sans-serif;
            margin-top: 100px;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
        }
        .spinner {
            display: block; width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-top-color: var(--accent-green);
            animation: spin 1s infinite linear; margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="bigMenu" class="overlay-menu" style="height: 0%; width: 100%; position: fixed; z-index: 1000; top: 0; right: 0; background-color: rgba(3, 62, 47, 0.98); overflow: hidden; transition: 0.5s; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <span onclick="closeNav()" style="position: absolute; top: 20px; right: 40px; font-size: 4rem; color: white; cursor: pointer;">&times;</span>
        <a href="Surah.html" style="padding: 10px; text-decoration: none; font-size: 2.2rem; color: white; display: block; font-family: 'Amiri', serif;">قائمة السور</a>
        <a href="Juzes.html" style="padding: 10px; text-decoration: none; font-size: 2.2rem; color: white; display: block; font-family: 'Amiri', serif;">الأجزاء الثلاثين</a>
        <a href="Search_by_word.html" style="padding: 10px; text-decoration: none; font-size: 2.2rem; color: white; display: block; font-family: 'Amiri', serif;">البحث بالآيات</a>
        <a href="Share.html" style="padding: 10px; text-decoration: none; font-size: 2.2rem; color: white; display: block; font-family: 'Amiri', serif;">مشاركة التطبيق</a>
        <hr style="width: 10%; border: 0.5px solid var(--accent-green); margin: 20px auto;">
        <a href="index.html" style="font-size: 1.2rem; opacity: 0.7; color: white; text-decoration: none;">الرئيسية</a>
    </div>

    <header>
        <div class="header-right">
            <button onclick="goBack()" class="back-btn">&#10142;</button> <button class="settings-trigger" onclick="openNav()">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-green);">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
        <h1 class="brand-name" id="viewTitle">جاري تحميل آيات الذكر الحكيم...</h1>
        <div style="width: 60px;"></div>
    </header>

    <div class="quran-container" id="quranView" style="display: none;"></div>

    <div id="loading" class="status-loading">
        <div class="spinner"></div>
        يتم الآن جلب نص المصحف الشريف المرتل بالرسم العثماني...
    </div>

    <div class="control-panel">
        <button class="control-btn" onclick="adjustFont(2)" title="تكبير الخط">+</button>
        <button class="control-btn" onclick="adjustFont(-2)" title="تصغير الخط">-</button>
        <button class="control-btn" onclick="switchFontFamily()" style="font-size: 0.9rem;" title="تغيير نوع الخط">خط</button>
    </div>

    <script>
        function openNav() { document.getElementById("bigMenu").style.height = "100%"; }
        function closeNav() { document.getElementById("bigMenu").style.height = "0%"; }
        
        function goBack() {
            if (document.referrer.includes('Juzes.html')) {
                window.location.href = 'Juzes.html';
            } else {
                window.location.href = 'Surah.html';
            }
        }

        const viewTitle = document.getElementById('viewTitle');
        const quranView = document.getElementById('quranView');
        const loadingDiv = document.getElementById('loading');

        const urlParams = new URLSearchParams(window.location.search);
        const surahId = urlParams.get('id');
        const juzId = urlParams.get('juz');

        let currentFontSize = parseInt(localStorage.getItem('quran_font_size')) || 32;
        let isAltFont = localStorage.getItem('quran_alt_font') === 'true';

        async function fetchQuranText() {
            try {
                const response = await fetch('https://api.alquran.cloud/v1/quran/quran-uthmani');
                const result = await response.json();
                const surahs = result.data.surahs;

                loadingDiv.style.display = 'none';
                quranView.style.display = 'block';

                if (surahId) {
                    renderBySurah(surahs[surahId - 1]);
                } else if (juzId) {
                    renderByJuz(surahs, parseInt(juzId));
                }
                
                applySavedPreferences();
            } catch (error) {
                loadingDiv.innerText = "فشل تحميل آيات القرآن الكريم. يرجى التحقق من اتصال الإنترنت وإعادة المحاولة.";
            }
        }

        function renderBySurah(surah) {
            viewTitle.innerText = `سورة ${surah.name}`;
            let htmlContent = "";

            if (surahId != 1 && surahId != 9) {
                htmlContent += `<span class="basmalah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span>`;
            }

            surah.ayahs.forEach(ayah => {
                let text = ayah.text;
                if (ayah.numberInSurah === 1 && surahId != 1 && surahId != 9) {
                    text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "").trim();
                }
                htmlContent += `<span class="ayah">${text} <span class="ayah-num">${ayah.numberInSurah}</span></span> `;
            });

            quranView.innerHTML = htmlContent;
        }

        function renderByJuz(surahs, targetJuz) {
            viewTitle.innerText = `الجزء رقم ${targetJuz}`;
            let htmlContent = "";
            let currentActiveSurah = null;

            surahs.forEach(surah => {
                surah.ayahs.forEach(ayah => {
                    if (ayah.juz === targetJuz) {
                        if (currentActiveSurah !== surah.number) {
                            currentActiveSurah = surah.number;
                            htmlContent += `
                                <div class="surah-divider">
                                    <span class="surah-title-badge">سُورَةُ ${surah.name}</span>
                                </div>
                            `;
                            if (surah.number !== 1 && surah.number !== 9) {
                                htmlContent += `<span class="basmalah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span>`;
                            }
                        }

                        let text = ayah.text;
                        if (ayah.numberInSurah === 1 && surah.number !== 1 && surah.number !== 9) {
                            text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "").trim();
                        }

                        htmlContent += `<span class="ayah">${text} <span class="ayah-num">${ayah.numberInSurah}</span></span> `;
                    }
                });
            });

            quranView.innerHTML = htmlContent;
        }

        function adjustFont(scale) {
            currentFontSize = Math.max(20, Math.min(50, currentFontSize + scale));
            const ayahs = document.querySelectorAll('.ayah');
            ayahs.forEach(a => a.style.fontSize = currentFontSize + 'px');
            localStorage.setItem('quran_font_size', currentFontSize);
        }

        function switchFontFamily() {
            isAltFont = !isAltFont;
            document.body.style.fontFamily = isAltFont ? "'Almarai', sans-serif" : "'Amiri', serif";
            localStorage.setItem('quran_alt_font', isAltFont);
        }

        function applySavedPreferences() {
            const ayahs = document.querySelectorAll('.ayah');
            ayahs.forEach(a => a.style.fontSize = currentFontSize + 'px');
            document.body.style.fontFamily = isAltFont ? "'Almarai', sans-serif" : "'Amiri', serif";
        }

        document.addEventListener("DOMContentLoaded", fetchQuranText);
    </script>
</body>
</html>
